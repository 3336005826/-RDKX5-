amcl:
  ros__parameters:
    use_sim_time: False

amcl_map_client:
  ros__parameters:
    use_sim_time: False

amcl_rclcpp_node:
  ros__parameters:
    use_sim_time: False

bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom_combined
    transform_tolerance: 0.40
    bt_loop_duration: 100
    default_server_timeout: 20
    goal_reached_tol: 0.25
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

bt_navigator_rclcpp_node:
  ros__parameters:
    use_sim_time: False

controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 15.0
    odom_topic: /odom_combined
    failure_tolerance: 0.6
    min_x_velocity_threshold: 0.02
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.05
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05
      movement_time_allowance: 12.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: True
      xy_goal_tolerance: 0.18
      yaw_goal_tolerance: 0.30

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      transform_tolerance: 0.40
      desired_linear_vel: 0.18
      lookahead_dist: 0.35
      min_lookahead_dist: 0.18
      max_lookahead_dist: 0.55
      lookahead_time: 1.0
      rotate_to_heading_angular_vel: 0.25
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.9
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.2
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.75
      regulated_linear_scaling_min_speed: 0.10
      use_rotate_to_heading: false
      rotate_to_heading_min_angle: 0.9
      max_angular_accel: 1.2
      max_robot_pose_search_dist: 8.0
      use_interpolation: true
      cost_scaling_dist: 0.52
      cost_scaling_gain: 0.35
      inflation_cost_scaling_factor: 5.5
      allow_reversing: false
      goal_dist_tol: 0.10

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: False
      update_frequency: 6.0
      publish_frequency: 2.0
      global_frame: odom_combined
      robot_base_frame: base_footprint
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.04
      footprint: "[[-0.278, -0.25], [-0.278, 0.25], [0.278, 0.25], [0.278, -0.25]]"
      plugins: ["voxel_layer", "inflation_layer"]

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: False
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        mark_threshold: 0
        max_obstacle_height: 2.0
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          clearing: True
          marking: True
          inf_is_valid: false
          obstacle_max_range: 4.0
          obstacle_min_range: 0.0
          raytrace_max_range: 6.0
          raytrace_min_range: 0.0
          max_obstacle_height: 2.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.5
        inflation_radius: 0.34

      always_send_full_costmap: False

  local_costmap_client:
    ros__parameters:
      use_sim_time: False

  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: False

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: False
      update_frequency: 2.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      resolution: 0.05
      footprint: "[[-0.278, -0.25], [-0.278, 0.25], [0.278, 0.25], [0.278, -0.25]]"
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: /map
        subscribe_to_updates: false
        map_subscribe_transient_local: True

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          clearing: True
          marking: True
          inf_is_valid: false
          obstacle_max_range: 5.0
          obstacle_min_range: 0.0
          raytrace_max_range: 8.0
          raytrace_min_range: 0.0
          max_obstacle_height: 2.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.48

      always_send_full_costmap: False

  global_costmap_client:
    ros__parameters:
      use_sim_time: False

  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: False

map_server:
  ros__parameters:
    use_sim_time: False
    yaml_filename: "WHEELTEC.yaml"

map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    use_sim_time: False
    expected_planner_frequency: 3.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      tolerance: 0.15
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 2000
      max_planning_time: 3.5
      motion_model_for_search: "DUBIN"
      cost_travel_multiplier: 3.2
      angle_quantization_bins: 72
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_cost: 160.0
      minimum_turning_radius: 0.20
      reverse_penalty: 1.05
      change_penalty: 0.25
      non_straight_penalty: 1.35
      cost_penalty: 5.00
      lookup_table_size: 20.0
      cache_obstacle_heuristic: True
      smooth_path: true
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10
        do_refinement: true

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

behavior_server:
  ros__parameters:
    use_sim_time: False
    global_frame: odom_combined
    robot_base_frame: base_footprint
    transform_tolerance: 0.35
    cycle_frequency: 10.0
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.6
    min_rotational_vel: 0.2
    rotational_acc_lim: 1.0
    behavior_plugins: ["spin", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"

behavior_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 0.1
      max_its: 1000
      do_refinement: True

waypoint_follower:
  ros__parameters:
    use_sim_time: False
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "CLOSED_LOOP"
    max_velocity: [0.40, 0.0, 1.0]
    min_velocity: [0.0, 0.0, -1.0]
    max_accel: [0.7, 0.0, 1.3]
    max_decel: [-1.0, 0.0, -1.5]
    odom_topic: /odom_combined
    odom_duration: 0.1
    deadband_velocity: [0.02, 0.0, 0.04]
    velocity_timeout: 1.0

collision_monitor:
  ros__parameters:
    use_sim_time: False
    base_frame_id: "base_footprint"
    odom_frame_id: "odom_combined"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    transform_tolerance: 0.35
    source_timeout: 0.6
    stop_pub_timeout: 0.8
    polygons: ["PolygonSlow", "PolygonStop"]
    PolygonSlow:
      type: "polygon"
      points: [0.56, 0.28, 0.56, -0.28, 0.02, -0.22, 0.02, 0.22]
      action_type: "slowdown"
      slowdown_ratio: 0.55
      max_points: 4
      visualize: True
      polygon_pub_topic: "polygon_slowdown"
    PolygonStop:
      type: "polygon"
      points: [0.38, 0.24, 0.38, -0.24, 0.04, -0.18, 0.04, 0.18]
      action_type: "stop"
      max_points: 4
      visualize: True
      polygon_pub_topic: "polygon_stop"
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan"
robot_state_publisher:
  ros__parameters:
    use_sim_time: False
